<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="方向盤改裝目錄 - 精選賽車方向盤、碳纖維方向盤、真皮方向盤">
  <meta property="og:title" content="方向盤改裝目錄">
  <meta property="og:description" content="精選賽車方向盤、碳纖維方向盤、真皮方向盤，改裝升級首選">
  <meta property="og:image" content="images/og-cover.jpg">
  <meta property="og:type" content="website">
  <meta itemprop="name" content="方向盤改裝目錄">
  <meta itemprop="image" content="images/og-cover.jpg">
  <title>方向盤改裝目錄 | Steering Wheel Catalog</title>

  <style>
    /* ======== 汽配風主題變數 ======== */
    :root {
      --color-bg: #0b0b0b;
      --color-surface: #141414;
      --color-card: #1a1a1a;
      --color-card-hover: #1f1f1f;
      --color-accent: #dc2626;
      --color-accent-glow: rgba(220,38,38,0.3);
      --color-silver: #b0b0b0;
      --color-silver-light: #d4d4d4;
      --color-text: #e8e8e8;
      --color-text-dim: #888888;
      --color-text-muted: #666666;
      --color-border: #2a2a2a;
      --color-border-light: #333333;
      --color-overlay: rgba(0,0,0,0.95);
      --radius: 8px;
      --radius-sm: 4px;
      --shadow-card: 0 2px 12px rgba(0,0,0,0.4);
      --shadow-card-hover: 0 8px 28px rgba(220,38,38,0.15), 0 4px 16px rgba(0,0,0,0.5);
      --shadow-elevated: 0 8px 32px rgba(0,0,0,0.6);
      --font-display: "Impact", "Arial Black", "PingFang SC", "Microsoft YaHei", sans-serif;
      --font-body: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      --transition-fast: 0.15s ease;
      --transition-normal: 0.3s ease;
      --max-width: 1400px;
    }

    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
      -webkit-tap-highlight-color: transparent;
      -webkit-text-size-adjust: 100%;
    }

    body {
      font-family: var(--font-body);
      background: var(--color-bg);
      color: var(--color-text);
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      /* 碳纖維紋理效果 */
      background-image:
        repeating-linear-gradient(
          90deg,
          transparent,
          transparent 2px,
          rgba(255,255,255,0.004) 2px,
          rgba(255,255,255,0.004) 4px
        ),
        repeating-linear-gradient(
          0deg,
          transparent,
          transparent 2px,
          rgba(255,255,255,0.003) 2px,
          rgba(255,255,255,0.003) 4px
        );
    }

    /* ======== 頂部導覽 ======== */
    .header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(11,11,11,0.9);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--color-border);
    }

    /* 頂部紅色裝飾線 */
    .header::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--color-accent), transparent);
      opacity: 0.8;
    }

    .header-inner {
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
      white-space: nowrap;
    }

    .brand-logo {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, #1a1a1a 0%, #2a2a2a 100%);
      border: 1.5px solid var(--color-border-light);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
      position: relative;
      overflow: hidden;
    }

    .brand-logo::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 20px;
      height: 2px;
      background: var(--color-accent);
      transform: translate(-50%, -50%);
    }

    .brand-text {
      display: flex;
      flex-direction: column;
    }

    .brand-name {
      font-family: var(--font-display);
      font-size: 20px;
      font-weight: 900;
      color: #fff;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .brand-sub {
      font-size: 10px;
      color: var(--color-text-dim);
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    .search-wrap {
      position: relative;
      flex: 1;
      max-width: 340px;
    }

    .search-input {
      width: 100%;
      padding: 10px 16px 10px 42px;
      background: var(--color-surface);
      border: 1px solid var(--color-border-light);
      border-radius: 4px;
      font-size: 14px;
      font-family: var(--font-body);
      color: var(--color-text);
      transition: all var(--transition-fast);
      outline: none;
    }

    .search-input:focus {
      border-color: var(--color-accent);
      box-shadow: 0 0 0 3px var(--color-accent-glow);
    }

    .search-input::placeholder {
      color: var(--color-text-muted);
    }

    .search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--color-text-muted);
      pointer-events: none;
      font-size: 15px;
    }

    .result-count {
      font-size: 12px;
      color: var(--color-text-muted);
      white-space: nowrap;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    /* ======== 分類標籤 ======== */
    .category-bar {
      position: sticky;
      top: 79px;
      z-index: 99;
      background: rgba(11,11,11,0.9);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--color-border);
    }

    .category-scroll {
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 0 24px;
      display: flex;
      gap: 0;
      overflow-x: auto;
      scrollbar-width: none;
      -ms-overflow-style: none;
      -webkit-overflow-scrolling: touch;
    }

    .category-scroll::-webkit-scrollbar { display: none; }

    .category-tab {
      flex-shrink: 0;
      padding: 12px 18px;
      font-size: 13px;
      font-weight: 600;
      color: var(--color-text-dim);
      cursor: pointer;
      border: none;
      background: none;
      font-family: var(--font-body);
      transition: all var(--transition-fast);
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      white-space: nowrap;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .category-tab:hover {
      color: var(--color-silver-light);
    }

    .category-tab.active {
      color: #fff;
      border-bottom-color: var(--color-accent);
    }

    .category-tab .count {
      font-size: 10px;
      margin-left: 4px;
      opacity: 0.5;
    }

    /* ======== 主要內容區 ======== */
    .main {
      flex: 1;
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 24px;
      width: 100%;
    }

    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
    }

    /* ======== 商品卡片 ======== */
    .product-card {
      background: var(--color-card);
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      overflow: hidden;
      cursor: pointer;
      transition: all var(--transition-normal);
      position: relative;
      display: flex;
      flex-direction: column;
    }

    .product-card:hover {
      background: var(--color-card-hover);
      border-color: var(--color-border-light);
      transform: translateY(-3px);
      box-shadow: var(--shadow-card-hover);
    }

    .product-card:active {
      transform: scale(0.98);
    }

    /* 圖片容器 */
    .card-image-wrap {
      position: relative;
      width: 100%;
      padding-top: 100%;
      overflow: hidden;
      background: #0f0f0f;
      border-bottom: 1px solid var(--color-border);
    }

    /* 斜角裁剪效果 */
    .card-image-wrap::after {
      content: '';
      position: absolute;
      bottom: 0;
      right: 0;
      width: 30px;
      height: 30px;
      background: var(--color-accent);
      clip-path: polygon(100% 0, 0% 100%, 100% 100%);
      z-index: 3;
      opacity: 0;
      transition: opacity var(--transition-normal);
    }

    .product-card:hover .card-image-wrap::after {
      opacity: 1;
    }

    .card-image {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.5s ease;
      background: #0f0f0f;
    }

    .product-card:hover .card-image {
      transform: scale(1.06);
    }

    .card-image-placeholder {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a1a1a 0%, #222 100%);
      color: #333;
      font-size: 56px;
    }

    .card-image.loaded + .card-image-placeholder {
      display: none;
    }

    /* 标签 */
    .card-badges {
      position: absolute;
      top: 12px;
      left: 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      z-index: 2;
      pointer-events: none;
    }

    .badge {
      padding: 5px 12px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .badge-new {
      background: var(--color-accent);
      color: #fff;
    }

    .badge-hot {
      background: #fff;
      color: #000;
    }

    .badge-carbon {
      background: #2a2a2a;
      color: #d4d4d4;
      border: 1px solid #444;
    }

    .badge-limited {
      background: linear-gradient(135deg, #c9a84c, #e8c958);
      color: #000;
    }

    .card-info {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex: 1;
    }

    .card-material {
      font-size: 10px;
      color: var(--color-accent);
      letter-spacing: 2px;
      text-transform: uppercase;
      font-weight: 600;
    }

    .card-name {
      font-size: 16px;
      font-weight: 700;
      color: #fff;
      line-height: 1.4;
    }

    .card-specs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      font-size: 11px;
      color: var(--color-text-dim);
    }

    .card-spec {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .card-spec-dot {
      width: 5px;
      height: 5px;
      background: var(--color-border-light);
      border-radius: 50%;
    }

    .card-bottom {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: auto;
      padding-top: 12px;
      border-top: 1px solid var(--color-border);
    }

    .card-price {
      font-size: 20px;
      font-weight: 900;
      color: #fff;
      font-family: var(--font-display);
    }

    .card-code {
      font-size: 10px;
      color: var(--color-text-muted);
      letter-spacing: 1px;
    }

    /* ======== 空狀態 ======== */
    .empty-state {
      text-align: center;
      padding: 100px 20px;
      grid-column: 1 / -1;
    }

    .empty-state-icon {
      font-size: 72px;
      margin-bottom: 20px;
      opacity: 0.3;
    }

    .empty-state-title {
      font-size: 20px;
      font-weight: 700;
      color: var(--color-silver-light);
      margin-bottom: 8px;
      letter-spacing: 1px;
    }

    .empty-state-desc {
      font-size: 14px;
      color: var(--color-text-muted);
    }

    .empty-state-btn {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 32px;
      background: var(--color-accent);
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 1px;
      cursor: pointer;
      border: none;
      font-family: var(--font-body);
      text-transform: uppercase;
      transition: background var(--transition-fast);
    }

    .empty-state-btn:hover {
      background: #ef4444;
    }

    /* ======== 燈箱 ======== */
    .lightbox {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 9999;
      background: var(--color-overlay);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity var(--transition-normal);
    }

    .lightbox.open {
      opacity: 1;
      pointer-events: auto;
    }

    .lightbox-content {
      position: relative;
      max-width: 90vw;
      max-height: 90vh;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 20px;
    }

    .lightbox-image {
      max-width: 90vw;
      max-height: 70vh;
      object-fit: contain;
      border-radius: var(--radius);
      border: 1px solid var(--color-border-light);
      box-shadow: var(--shadow-elevated);
      transition: opacity 0.2s ease;
      user-select: none;
      -webkit-user-drag: none;
    }

    .lightbox-image.switching {
      opacity: 0;
    }

    .lightbox-close {
      position: fixed;
      top: 20px;
      right: 24px;
      width: 44px;
      height: 44px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      color: #fff;
      font-size: 20px;
      cursor: pointer;
      z-index: 10001;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all var(--transition-fast);
    }

    .lightbox-close:hover {
      background: var(--color-accent);
      border-color: var(--color-accent);
    }

    .lightbox-nav {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      width: 50px;
      height: 50px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      color: #fff;
      font-size: 18px;
      cursor: pointer;
      z-index: 10001;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all var(--transition-fast);
      border-radius: var(--radius-sm);
    }

    .lightbox-nav:hover {
      background: rgba(255,255,255,0.12);
      border-color: var(--color-accent);
    }

    .lightbox-prev { left: 20px; }
    .lightbox-next { right: 20px; }

    .lightbox-info {
      text-align: center;
    }

    .lightbox-name {
      font-size: 20px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 6px;
      letter-spacing: 0.5px;
    }

    .lightbox-meta {
      font-size: 12px;
      color: var(--color-text-dim);
      letter-spacing: 1px;
    }

    .lightbox-counter {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.4);
      font-size: 12px;
      letter-spacing: 2px;
    }

    .swipe-hint {
      display: none;
      position: fixed;
      bottom: 56px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.25);
      font-size: 11px;
      letter-spacing: 1px;
    }

    @media (max-width: 640px) {
      .swipe-hint { display: block; }
      .lightbox-nav { display: none; }
    }

    /* ======== 頁腳 ======== */
    .footer {
      border-top: 1px solid var(--color-border);
      padding: 24px;
      text-align: center;
      font-size: 12px;
      color: var(--color-text-muted);
      background: var(--color-surface);
      letter-spacing: 1px;
    }

    .footer-highlight {
      color: var(--color-accent);
      font-weight: 600;
    }

    /* ======== 響應式 ======== */
    @media (max-width: 1024px) {
      .product-grid {
        grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
        gap: 16px;
      }
    }

    @media (max-width: 640px) {
      .header-inner {
        padding: 12px 16px;
        gap: 12px;
      }

      .brand-name { font-size: 17px; letter-spacing: 1px; }
      .brand-logo { width: 36px; height: 36px; font-size: 16px; }
      .brand-sub { font-size: 9px; }
      .search-wrap { max-width: none; }
      .search-input { font-size: 13px; padding: 8px 14px 8px 34px; }
      .result-count { display: none; }

      .category-bar { top: 69px; }
      .category-scroll { padding: 0 12px; }
      .category-tab { padding: 10px 14px; font-size: 11px; }

      .main { padding: 16px 12px; }
      .product-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 10px;
      }

      .card-info { padding: 12px; }
      .card-name { font-size: 14px; }
      .card-price { font-size: 17px; }
      .card-material { font-size: 9px; }
      .card-specs { font-size: 10px; }

      .lightbox-close {
        top: 12px; right: 12px;
        width: 38px; height: 38px;
        font-size: 16px;
      }
      .lightbox-name { font-size: 16px; }
    }

    @media (max-width: 380px) {
      .product-grid { gap: 8px; }
      .card-info { padding: 10px; }
      .card-name { font-size: 12px; }
      .card-price { font-size: 15px; }
    }

    /* ======== 動畫 ======== */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .product-card {
      animation: fadeInUp 0.4s ease both;
    }

    /* ======== 捲軸 ======== */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--color-bg); }
    ::-webkit-scrollbar-thumb { background: var(--color-border-light); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #444; }
  </style>
</head>
<body>

  <!-- ===== 頂部導覽 ===== -->
  <header class="header">
    <div class="header-inner">
      <a class="brand" href="./">
        <div class="brand-logo">⚙</div>
        <div class="brand-text">
          <span class="brand-name">STEERHUB</span>
          <span class="brand-sub">Performance Steering</span>
        </div>
      </a>
      <div class="search-wrap">
        <span class="search-icon">⌕</span>
        <input type="text" class="search-input" id="searchInput"
               placeholder="搜尋方向盤型號..." autocomplete="off">
      </div>
      <span class="result-count" id="resultCount"></span>
    </div>
  </header>

  <!-- ===== 分類標籤 ===== -->
  <nav class="category-bar">
    <div class="category-scroll" id="categoryBar"></div>
  </nav>

  <!-- ===== 商品列表 ===== -->
  <main class="main">
    <div class="product-grid" id="productGrid"></div>
  </main>

  <!-- ===== 頁腳 ===== -->
  <footer class="footer">
    <p><span class="footer-highlight">STEERHUB</span> Performance Steering Wheel Catalog · 2026</p>
  </footer>

  <!-- ===== 燈箱 ===== -->
  <div class="lightbox" id="lightbox">
    <button class="lightbox-close" id="lightboxClose">✕</button>
    <button class="lightbox-nav lightbox-prev" id="lightboxPrev">◀</button>
    <button class="lightbox-nav lightbox-next" id="lightboxNext">▶</button>
    <div class="lightbox-content">
      <img class="lightbox-image" id="lightboxImage" src="" alt="" draggable="false">
      <div class="lightbox-info">
        <div class="lightbox-name" id="lightboxName"></div>
        <div class="lightbox-meta" id="lightboxMeta"></div>
      </div>
    </div>
    <div class="lightbox-counter" id="lightboxCounter"></div>
    <div class="swipe-hint">← SWIPE →</div>
  </div>

  <!-- ===== 資料 & 程式 ===== -->
  <script src="products.js"></script>

  <script>
    (function() {
      const ALL = '全部';

      const $ = id => document.getElementById(id);
      const searchInput = $('searchInput');
      const categoryBar = $('categoryBar');
      const productGrid = $('productGrid');
      const resultCount = $('resultCount');
      const lightbox = $('lightbox');
      const lbImage = $('lightboxImage');
      const lbName = $('lightboxName');
      const lbMeta = $('lightboxMeta');
      const lbCounter = $('lightboxCounter');

      let currentCat = ALL;
      let currentSearch = '';
      let lbIndex = -1;
      let filtered = [];
      let tx = 0, ty = 0;

      function init() {
        if (typeof PRODUCTS === 'undefined') {
          productGrid.innerHTML = '<div class="empty-state"><div class="empty-state-icon">🏎</div><div class="empty-state-title">NO PRODUCTS</div><div class="empty-state-desc">請設定 products.js 中的商品資料</div></div>';
          return;
        }
        buildCats();
        apply();
        bindEvents();
        loadHash();
      }

      function buildCats() {
        const cats = [ALL], set = new Set();
        PRODUCTS.forEach(p => { if (p.category && !set.has(p.category)) { set.add(p.category); cats.push(p.category); } });
        categoryBar.innerHTML = cats.map(c => {
          const n = c === ALL ? PRODUCTS.length : PRODUCTS.filter(p => p.category === c).length;
          return `<button class="category-tab" data-cat="${c}">${c}<span class="count">${n}</span></button>`;
        }).join('');
        categoryBar.querySelectorAll('.category-tab').forEach(t => {
          t.addEventListener('click', () => {
            currentCat = t.dataset.cat;
            currentSearch = '';
            searchInput.value = '';
            updateCatUI();
            apply();
            setHash();
            t.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
          });
        });
        updateCatUI();
      }

      function updateCatUI() {
        categoryBar.querySelectorAll('.category-tab').forEach(t => t.classList.toggle('active', t.dataset.cat === currentCat));
      }

      function apply() {
        filtered = PRODUCTS.filter(p => {
          const mc = currentCat === ALL || p.category === currentCat;
          const ms = !currentSearch ||
            p.name.toLowerCase().includes(currentSearch.toLowerCase()) ||
            (p.material && p.material.toLowerCase().includes(currentSearch.toLowerCase())) ||
            (p.desc && p.desc.toLowerCase().includes(currentSearch.toLowerCase())) ||
            (p.brand && p.brand.toLowerCase().includes(currentSearch.toLowerCase())) ||
            (p.tags && p.tags.some(t => t.toLowerCase().includes(currentSearch.toLowerCase())));
          return mc && ms;
        });
        render();
      }

      function render() {
        if (!filtered.length) {
          productGrid.innerHTML = `<div class="empty-state"><div class="empty-state-icon">🔍</div><div class="empty-state-title">未找到符合的商品</div><div class="empty-state-desc">試試其他分類或關鍵詞</div><button class="empty-state-btn" onclick="location.reload()">檢視全部</button></div>`;
          resultCount.textContent = '';
          return;
        }
        resultCount.textContent = `${filtered.length} ITEMS`;

        productGrid.innerHTML = filtered.map((p, i) => {
          const tags = (p.tags || []).map(t => {
            let cls = 'badge-new';
            if (t === '熱銷') cls = 'badge-hot';
            else if (t === '限量') cls = 'badge-limited';
            else if (t === '碳纖維') cls = 'badge-carbon';
            return `<span class="badge ${cls}">${t}</span>`;
          }).join('');

          return `
            <div class="product-card" data-idx="${i}" style="animation-delay:${Math.min(i*0.025,0.5)}s">
              <div class="card-image-wrap">
                ${tags ? `<div class="card-badges">${tags}</div>` : ''}
                <img class="card-image" src="${p.image}" alt="${p.name}" loading="lazy"
                     onload="this.classList.add('loaded')"
                     onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">
                <div class="card-image-placeholder" style="display:none;">🏎</div>
              </div>
              <div class="card-info">
                ${p.material ? `<div class="card-material">${p.material}</div>` : ''}
                <div class="card-name">${p.name}</div>
                ${p.specs ? `<div class="card-specs">${p.specs.map(s => `<span class="card-spec"><span class="card-spec-dot"></span>${s}</span>`).join('')}</div>` : ''}
                <div class="card-bottom">
                  ${p.price ? `<span class="card-price">${p.price}</span>` : '<span></span>'}
                  ${p.code ? `<span class="card-code">${p.code}</span>` : ''}
                </div>
              </div>
            </div>`;
        }).join('');

        productGrid.querySelectorAll('.product-card').forEach(c => {
          c.addEventListener('click', () => openLB(parseInt(c.dataset.idx)));
        });
      }

      function openLB(i) {
        lbIndex = i; updateLB(); lightbox.classList.add('open');
        document.body.style.overflow = 'hidden'; updateCounter();
      }
      function closeLB() {
        lightbox.classList.remove('open'); document.body.style.overflow = ''; lbIndex = -1;
      }
      function nav(d) {
        if (!filtered.length) return;
        lbIndex = (lbIndex + d + filtered.length) % filtered.length; updateLB(); updateCounter();
      }

      function updateLB() {
        const p = filtered[lbIndex]; if (!p) return;
        lbImage.classList.add('switching');
        lbImage.src = p.image; lbImage.alt = p.name;
        lbName.textContent = p.name;
        lbMeta.textContent = [p.brand, p.material, p.price, p.code].filter(Boolean).join(' · ');
      }
      function updateCounter() {
        lbCounter.textContent = `${lbIndex+1} / ${filtered.length}`;
      }

      function setHash() {
        if (currentCat === ALL && !currentSearch) { history.replaceState(null, '', location.pathname); return; }
        const p = new URLSearchParams();
        if (currentCat !== ALL) p.set('cat', currentCat);
        if (currentSearch) p.set('q', currentSearch);
        history.replaceState(null, '', '?'+p.toString());
      }

      function loadHash() {
        const p = new URLSearchParams(location.search);
        const c = p.get('cat'), q = p.get('q');
        if (c) { currentCat = c; updateCatUI(); }
        if (q) { currentSearch = q; searchInput.value = q; }
        if (c || q) apply();
      }

      function bindEvents() {
        let t;
        searchInput.addEventListener('input', () => {
          clearTimeout(t);
          t = setTimeout(() => { currentSearch = searchInput.value.trim(); apply(); setHash(); }, 250);
        });

        $('lightboxClose').addEventListener('click', closeLB);
        lightbox.addEventListener('click', e => { if (e.target === lightbox) closeLB(); });
        $('lightboxPrev').addEventListener('click', () => nav(-1));
        $('lightboxNext').addEventListener('click', () => nav(1));
        lbImage.addEventListener('load', () => lbImage.classList.remove('switching'));

        document.addEventListener('keydown', e => {
          if (!lightbox.classList.contains('open')) return;
          if (e.key === 'Escape') closeLB();
          if (e.key === 'ArrowLeft') nav(-1);
          if (e.key === 'ArrowRight') nav(1);
        });

        lightbox.addEventListener('touchstart', e => {
          tx = e.touches[0].clientX; ty = e.touches[0].clientY;
        }, { passive: true });
        lightbox.addEventListener('touchend', e => {
          const dx = e.changedTouches[0].clientX - tx;
          const dy = e.changedTouches[0].clientY - ty;
          if (Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy)) nav(dx < 0 ? 1 : -1);
        });

        window.addEventListener('popstate', () => {
          const p = new URLSearchParams(location.search);
          currentCat = p.get('cat') || ALL;
          currentSearch = p.get('q') || '';
          searchInput.value = currentSearch;
          updateCatUI();
          apply();
        });
      }

      init();
    })();
  </script>
</body>
</html>
