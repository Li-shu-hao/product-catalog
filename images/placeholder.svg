<svg xmlns="http://www.w3.org/2000/svg" width="600" height="600" viewBox="0 0 600 600">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="60%">
      <stop offset="0%" style="stop-color:#1f1f1f"/>
      <stop offset="100%" style="stop-color:#0d0d0d"/>
    </radialGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#dc2626"/>
      <stop offset="100%" style="stop-color:#991b1b"/>
    </linearGradient>
  </defs>
  <rect width="600" height="600" fill="url(#bg)"/>

  <!-- 方向盤外圈 -->
  <circle cx="300" cy="280" r="170" fill="none" stroke="#333" stroke-width="28"/>
  <circle cx="300" cy="280" r="170" fill="none" stroke="#3a3a3a" stroke-width="24"/>
  <circle cx="300" cy="280" r="170" fill="none" stroke="#444" stroke-width="2" opacity="0.5"/>

  <!-- 三辐 -->
  <line x1="300" y1="280" x2="300" y2="110" stroke="#333" stroke-width="22"/>
  <line x1="300" y1="280" x2="155" y2="425" stroke="#333" stroke-width="18"/>
  <line x1="300" y1="280" x2="445" y2="425" stroke="#333" stroke-width="18"/>

  <!-- 辐条高光 -->
  <line x1="300" y1="280" x2="300" y2="115" stroke="#3d3d3d" stroke-width="14"/>
  <line x1="300" y1="280" x2="162" y2="418" stroke="#3d3d3d" stroke-width="10"/>
  <line x1="300" y1="280" x2="438" y2="418" stroke="#3d3d3d" stroke-width="10"/>

  <!-- 中心 hub -->
  <circle cx="300" cy="280" r="48" fill="#1a1a1a" stroke="#444" stroke-width="2"/>
  <circle cx="300" cy="280" r="36" fill="url(#accent)" opacity="0.8"/>
  <circle cx="300" cy="280" r="14" fill="#1a1a1a" stroke="#555" stroke-width="1"/>

  <!-- 中心品牌标识 -->
  <text x="300" y="286" text-anchor="middle" font-family="Arial Black,sans-serif" font-size="11" fill="#fff" font-weight="900" letter-spacing="1">STEER</text>

  <!-- 碳纖維紋理線 -->
  <g opacity="0.06">
    <line x1="0" y1="60" x2="600" y2="60" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="120" x2="600" y2="120" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="180" x2="600" y2="180" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="240" x2="600" y2="240" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="300" x2="600" y2="300" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="360" x2="600" y2="360" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="420" x2="600" y2="420" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="480" x2="600" y2="480" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="540" x2="600" y2="540" stroke="#fff" stroke-width="0.5"/>
  </g>

  <!-- 底部紅色裝飾線 -->
  <rect x="0" y="590" width="600" height="10" fill="url(#accent)"/>

  <!-- 替換提示 -->
  <text x="300" y="550" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="#555">REPLACE WITH YOUR STEERING WHEEL IMAGE</text>
</svg>
